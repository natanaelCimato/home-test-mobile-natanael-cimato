name: Android Emulator Image

on:
  push:
    branches:
      - main
    paths:
      - docker/android/Dockerfile
      - docker-compose.ci.yml
      - .github/workflows/android-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/natanaelcimato/home-test-mobile-natanael-cimato/android-emulator

jobs:
  build:
    name: Build and publish emulator image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push CI image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: docker/android/Dockerfile
          push: true
          build-args: |
            SOFTWARE_ACCELERATION=false
          tags: |
            ${{ env.IMAGE_NAME }}:ci
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
