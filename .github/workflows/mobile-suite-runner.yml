name: Mobile Suite Runner

on:
  workflow_call:
    inputs:
      suite:
        description: Suite label used in logs, artifacts, and Slack.
        required: true
        type: string
      compose_profile:
        description: Docker Compose profile required by the suite.
        required: false
        default: ""
        type: string
      compose_service:
        description: Docker Compose test service to run.
        required: true
        type: string
      artifact_prefix:
        description: Artifact name prefix for test evidence.
        required: true
        type: string
      timeout_minutes:
        description: Job timeout in minutes.
        required: false
        default: 120
        type: number

permissions:
  contents: read
  packages: read

env:
  APK_FILE: app-home-test-mobile.apk
  APK_RELEASE_TAG: ${{ vars.APK_RELEASE_TAG || 'mobile-apk' }}
  APK_DOWNLOAD_URL: ${{ secrets.APK_DOWNLOAD_URL || vars.APK_DOWNLOAD_URL }}
  EXPECTED_APK_SHA256: ${{ secrets.APK_SHA256 }}
  CI_ANDROID_IMAGE: ${{ vars.CI_ANDROID_IMAGE }}
  DOCKER_BUILDKIT: "1"

jobs:
  mobile:
    name: Run ${{ inputs.suite }} suite
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Resolve CI Android image
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${CI_ANDROID_IMAGE:-}" ]; then
            image="${CI_ANDROID_IMAGE}"
          else
            repository="${GITHUB_REPOSITORY,,}"
            image="ghcr.io/${repository}/android-emulator:ci"
          fi

          echo "CI_ANDROID_IMAGE=${image}" >> "${GITHUB_ENV}"
          echo "Using Android image ${image}"

      - name: Restore Gradle cache
        uses: actions/cache@v6.0.0
        with:
          path: |
            .ci-gradle-cache/caches/modules-2
            .ci-gradle-cache/caches/jars-*
            .ci-gradle-cache/caches/transforms-*
            .ci-gradle-cache/caches/build-cache-*
            .ci-gradle-cache/caches/*/generated-gradle-jars
            .ci-gradle-cache/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('build.gradle', 'settings.gradle', 'gradle.properties', 'gradle/**/*.toml', '**/build.gradle', '**/build.gradle.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Prepare Gradle cache directory
        run: |
          mkdir -p .ci-gradle-cache
          sudo chmod -R a+rwX .ci-gradle-cache

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Enable KVM
        run: |
          set -euo pipefail

          if [ ! -e /dev/kvm ]; then
            echo "::error::/dev/kvm is not available on this runner. Android emulator CI needs KVM hardware acceleration."
            exit 1
          fi

          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Resolve APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/resolve-apk.sh

      - name: Pull or build Android image
        run: bash .github/scripts/prepare-android-image.sh

      - name: Start Android emulator
        run: |
          set -euo pipefail
          compose=(docker compose -f docker-compose.yml -f docker-compose.ci.yml)
          "${compose[@]}" up -d --no-build android

      - name: Wait for Android emulator
        run: |
          set -euo pipefail
          compose=(docker compose -f docker-compose.yml -f docker-compose.ci.yml)
          deadline=$((SECONDS + 1800))

          while [ "${SECONDS}" -lt "${deadline}" ]; do
            status="$(docker inspect -f '{{ if .State.Health }}{{ .State.Health.Status }}{{ else }}{{ .State.Status }}{{ end }}' home-test-mobile-android 2>/dev/null || echo missing)"
            echo "Android health: ${status} at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            if [ "${status}" = "healthy" ]; then
              exit 0
            fi

            "${compose[@]}" logs --no-color --tail=50 android || true
            sleep 30
          done

          echo "::error::Android emulator did not become healthy within 30 minutes."
          mkdir -p build/ci-diagnostics
          docker inspect home-test-mobile-android > build/ci-diagnostics/android-inspect-timeout.json || true
          "${compose[@]}" logs --no-color --tail=300 android || true
          exit 1

      - name: Run ${{ inputs.suite }} suite
        run: |
          set -euo pipefail

          compose=(docker compose -f docker-compose.yml -f docker-compose.ci.yml)
          compose_profile="${{ inputs.compose_profile }}"
          compose_service="${{ inputs.compose_service }}"
          profile_args=()

          if [ -n "${compose_profile}" ]; then
            profile_args=(--profile "${compose_profile}")
          fi

          "${compose[@]}" "${profile_args[@]}" up \
            --no-build \
            --no-deps \
            --abort-on-container-exit \
            --exit-code-from "${compose_service}" \
            "${compose_service}"

      - name: Collect Docker logs
        if: always()
        run: |
          sudo mkdir -p build/ci-diagnostics
          sudo chmod -R a+rwX build
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps > build/ci-diagnostics/docker-compose-ps.txt || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color --timestamps > build/ci-diagnostics/docker-compose.log || true
          docker inspect home-test-mobile-android > build/ci-diagnostics/android-inspect.json || true
          docker image inspect "${CI_ANDROID_IMAGE}" > build/ci-diagnostics/android-image-inspect.json || true
          docker system df > build/ci-diagnostics/docker-system-df.txt || true

      - name: Generate Allure report
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile report run --rm allure-report || true

      - name: Normalize generated file permissions
        if: always()
        run: |
          sudo rm -rf .ci-gradle-cache/daemon .ci-gradle-cache/workers .ci-gradle-cache/native
          sudo chown -R "$(id -u):$(id -g)" .ci-gradle-cache build || true
          sudo chmod -R u+rwX,go+rX .ci-gradle-cache build || true

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ inputs.artifact_prefix }}-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: |
            build/allure-results/**
            build/reports/**
            build/test-results/**
            build/ci-diagnostics/**
          if-no-files-found: warn
          compression-level: 1
          retention-days: 14

      - name: Stop Docker environment
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans || true

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTIFICATION_STATUS: ${{ job.status }}
          NOTIFICATION_WORKFLOW: ${{ github.workflow }}
          NOTIFICATION_JOB: mobile
          NOTIFICATION_SUITE: ${{ inputs.suite }}
          NOTIFICATION_REPOSITORY: ${{ github.repository }}
          NOTIFICATION_BRANCH: ${{ github.ref_name }}
          NOTIFICATION_SHA: ${{ github.sha }}
          NOTIFICATION_ACTOR: ${{ github.actor }}
          NOTIFICATION_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NOTIFICATION_ARTIFACTS_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/notify-slack.sh
