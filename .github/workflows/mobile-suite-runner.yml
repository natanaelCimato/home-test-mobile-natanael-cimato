name: Mobile Suite Runner

on:
  workflow_call:
    inputs:
      suite:
        description: Suite label used in logs, artifacts, and Slack.
        required: true
        type: string
      compose_profile:
        description: Docker Compose profile required by the suite.
        required: false
        default: ""
        type: string
      compose_service:
        description: Docker Compose test service to run.
        required: true
        type: string
      artifact_prefix:
        description: Artifact name prefix for test evidence.
        required: true
        type: string
      timeout_minutes:
        description: Job timeout in minutes.
        required: false
        default: 120
        type: number

permissions:
  contents: read
  packages: read

env:
  APK_FILE: app-home-test-mobile.apk
  APK_RELEASE_TAG: ${{ vars.APK_RELEASE_TAG || 'mobile-apk' }}
  APK_DOWNLOAD_URL: ${{ secrets.APK_DOWNLOAD_URL || vars.APK_DOWNLOAD_URL }}
  EXPECTED_APK_SHA256: ${{ secrets.APK_SHA256 }}
  CI_ANDROID_IMAGE: ghcr.io/natanaelcimato/home-test-mobile-natanael-cimato/android-emulator:ci

jobs:
  mobile:
    name: Run ${{ inputs.suite }} suite
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Restore Gradle cache
        uses: actions/cache@v6.0.0
        with:
          path: .ci-gradle-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('build.gradle', 'settings.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Prepare Gradle cache directory
        run: |
          mkdir -p .ci-gradle-cache
          sudo chmod -R a+rwX .ci-gradle-cache

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Enable KVM
        run: |
          set -euo pipefail

          if [ ! -e /dev/kvm ]; then
            echo "::error::/dev/kvm is not available on this runner. Android emulator CI needs KVM hardware acceleration."
            exit 1
          fi

          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Resolve APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -n "${APK_DOWNLOAD_URL:-}" ]; then
            echo "Downloading APK from APK_DOWNLOAD_URL."
            curl --fail --location --retry 3 --retry-delay 10 \
              --output "${APK_FILE}" \
              "${APK_DOWNLOAD_URL}"
          else
            echo "APK_DOWNLOAD_URL is not configured. Downloading ${APK_FILE} from release tag ${APK_RELEASE_TAG}."
            gh release download "${APK_RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "${APK_FILE}" \
              --dir .
          fi

          test -s "${APK_FILE}"
          if [ -z "${EXPECTED_APK_SHA256:-}" ]; then
            echo "::error::APK_SHA256 secret is required to validate the downloaded APK."
            exit 1
          fi

          actual_sha="$(sha256sum "${APK_FILE}" | awk '{print toupper($1)}')"
          expected_sha="$(echo "${EXPECTED_APK_SHA256}" | tr '[:lower:]' '[:upper:]')"

          if [ "${actual_sha}" != "${expected_sha}" ]; then
            echo "::error::APK checksum verification failed."
            exit 1
          fi

          echo "APK checksum verified."

      - name: Start Android emulator
        run: |
          set -euo pipefail
          compose=(docker compose -f docker-compose.yml -f docker-compose.ci.yml)
          "${compose[@]}" pull android
          "${compose[@]}" up -d --no-build android

      - name: Wait for Android emulator
        run: |
          set -euo pipefail
          compose=(docker compose -f docker-compose.yml -f docker-compose.ci.yml)
          deadline=$((SECONDS + 1800))

          while [ "${SECONDS}" -lt "${deadline}" ]; do
            status="$(docker inspect -f '{{ if .State.Health }}{{ .State.Health.Status }}{{ else }}{{ .State.Status }}{{ end }}' home-test-mobile-android 2>/dev/null || echo missing)"
            echo "Android health: ${status} at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            if [ "${status}" = "healthy" ]; then
              exit 0
            fi

            "${compose[@]}" logs --no-color --tail=80 android || true
            sleep 30
          done

          echo "::error::Android emulator did not become healthy within 30 minutes."
          docker inspect home-test-mobile-android || true
          "${compose[@]}" logs --no-color android || true
          exit 1

      - name: Run ${{ inputs.suite }} suite
        run: |
          set -euo pipefail

          compose=(docker compose -f docker-compose.yml -f docker-compose.ci.yml)
          compose_profile="${{ inputs.compose_profile }}"
          compose_service="${{ inputs.compose_service }}"
          profile_args=()

          if [ -n "${compose_profile}" ]; then
            profile_args=(--profile "${compose_profile}")
          fi

          "${compose[@]}" "${profile_args[@]}" up \
            --no-build \
            --no-deps \
            --abort-on-container-exit \
            --exit-code-from "${compose_service}" \
            "${compose_service}"

      - name: Collect Docker logs
        if: always()
        run: |
          sudo mkdir -p build/ci-diagnostics
          sudo chmod -R a+rwX build
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps > build/ci-diagnostics/docker-compose-ps.txt || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color > build/ci-diagnostics/docker-compose.log || true

      - name: Generate Allure report
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile report run --rm allure-report || true

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ inputs.artifact_prefix }}-${{ github.run_number }}
          path: |
            build/allure-results/**
            build/reports/**
            build/test-results/**
            build/ci-diagnostics/**
          if-no-files-found: warn
          retention-days: 14

      - name: Stop Docker environment
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans || true

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTIFICATION_STATUS: ${{ job.status }}
          NOTIFICATION_WORKFLOW: ${{ github.workflow }}
          NOTIFICATION_JOB: mobile
          NOTIFICATION_SUITE: ${{ inputs.suite }}
          NOTIFICATION_REPOSITORY: ${{ github.repository }}
          NOTIFICATION_BRANCH: ${{ github.ref_name }}
          NOTIFICATION_SHA: ${{ github.sha }}
          NOTIFICATION_ACTOR: ${{ github.actor }}
          NOTIFICATION_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NOTIFICATION_ARTIFACTS_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/notify-slack.sh
