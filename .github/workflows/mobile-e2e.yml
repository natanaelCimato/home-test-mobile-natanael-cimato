name: E2E Suite

on:
  workflow_dispatch:

concurrency:
  group: e2e-suite-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  e2e:
    name: Run E2E suite
    uses: ./.github/workflows/mobile-suite-runner.yml
    with:
      suite: e2e
      compose_profile: ""
      compose_service: tests
      artifact_prefix: mobile-evidence-e2e
      timeout_minutes: 120
    secrets: inherit
