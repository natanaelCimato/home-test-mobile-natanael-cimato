name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  compile:
    name: Compile test source sets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile with Dockerized Gradle
        run: >
          docker run --rm
          -v "$PWD:/workspace"
          -w /workspace
          gradle:8-jdk17
          gradle --no-daemon
          compileJava
          compileTestJava
          compileCucumberTestJava
          compilePerformanceTestJava
